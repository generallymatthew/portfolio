<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Scholarship Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
      z-index: 100;
    }

    .header h1 {
      font-size: 20px;
      color: #0066cc;
    }

    .main-content {
      margin-top: 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      height: calc(100vh - 120px);
    }

    /* CHAT PANE */
    .chat-pane {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.assistant .message-content {
      background: #e8f4f8;
      color: #0066cc;
    }

    .message.user .message-content {
      background: #0066cc;
      color: white;
    }

    .chat-input-area {
      padding: 20px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    .chat-input-area.url-input {
      flex-direction: column;
    }

    .url-input-group {
      display: flex;
      gap: 10px;
    }

    .chat-input-area input,
    .chat-input-area textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
    }

    .chat-input-area input:focus,
    .chat-input-area textarea:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
    }

    .chat-input-area button {
      padding: 12px 20px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
    }

    .chat-input-area button:hover {
      background: #0052a3;
    }

    .chat-input-area button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .url-input-hint {
      font-size: 12px;
      color: #999;
    }

    /* WORKSPACE PANE */
    .workspace-pane {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      overflow-y: auto;
      display: none;
    }

    .workspace-pane.active {
      display: block;
    }

    .workspace-pane h2 {
      font-size: 16px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e0e0e0;
    }

    .profile-preview {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .profile-preview h3 {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .profile-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 13px;
    }

    .profile-item label {
      font-weight: 600;
      color: #333;
    }

    .profile-item value {
      color: #0066cc;
    }

    .scholarship-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .scholarship-item {
      padding: 12px;
      background: #f9f9f9;
      border-left: 3px solid #0066cc;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .scholarship-item:hover {
      background: #f0f0f0;
    }

    .scholarship-item.selected {
      background: #e8f4f8;
      border-left-color: #ff9800;
    }

    .scholarship-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .scholarship-meta {
      font-size: 11px;
      color: #666;
    }

    .scholarship-score {
      float: right;
      background: #0066cc;
      color: white;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
    }

    .loading-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0066cc;
      font-size: 13px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #0066cc;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎓 AI Scholarship Assistant</h1>
    <p style="font-size: 13px; color: #666; margin-top: 5px;">Find scholarships you qualify for with AI-powered insights</p>
  </div>

  <div class="main-content">
    <!-- CHAT PANE -->
    <div class="chat-pane">
      <div class="chat-messages" id="chatMessages"></div>

      <!-- URL Input (Initial Screen) -->
      <div class="chat-input-area url-input" id="urlInputArea">
        <div class="url-input-group">
          <input
            type="url"
            id="collegeUrl"
            placeholder="e.g., https://ncsu.edu"
            autocomplete="off"
          />
          <button id="submitUrlBtn" onclick="submitCollege()">Start</button>
        </div>
        <div class="url-input-hint">Enter your college scholarship page URL to get started</div>
      </div>

      <!-- Chat Input (Hidden until URL submitted) -->
      <div class="chat-input-area" id="chatInputArea" style="display: none;">
        <div style="display: flex; gap: 10px;">
          <textarea
            id="userMessage"
            placeholder="Type your response..."
            rows="2"
            onkeypress="if(event.key==='Enter' && !event.shiftKey) sendMessage()"
          ></textarea>
          <button id="sendBtn" onclick="sendMessage()" style="padding: 12px 16px;">Send</button>
        </div>
      </div>
    </div>

    <!-- WORKSPACE PANE -->
    <div class="workspace-pane" id="workspacePane">
      <h2>Your Profile</h2>
      <div class="profile-preview" id="profilePreview"></div>

      <h2>Top Scholarships for You</h2>
      <div class="scholarship-list" id="scholarshipList"></div>
    </div>
  </div>

  <script>
    // State management
    let conversationHistory = [];
    let userProfile = {
      gpa: null,
      major: null,
      isFirstGen: null,
      financialNeed: null,
      collegeUrl: null
    };
    let rankedScholarships = [];
    let currentPhase = 'url-input'; // url-input, asking-questions, showing-results

    // Add initial message
    function initializeChat() {
      addMessage('assistant', "Welcome to the AI Scholarship Assistant! 🎓\n\nI'll help you find scholarships you qualify for at your college.\n\nFirst, please enter your college's scholarship page URL above (e.g., https://ncsu.edu)");
    }

    // Add message to chat
    function addMessage(role, content) {
      const messagesDiv = document.getElementById('chatMessages');
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;
      messageEl.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Submit college URL
    async function submitCollege() {
      const urlInput = document.getElementById('collegeUrl');
      const url = urlInput.value.trim();

      if (!url) {
        alert('Please enter a college URL');
        return;
      }

      // Hide URL input, show chat input
      document.getElementById('urlInputArea').style.display = 'none';
      document.getElementById('chatInputArea').style.display = 'flex';
      currentPhase = 'asking-questions';

      addMessage('user', url);
      userProfile.collegeUrl = url;

      // Simulate Claude response
      addMessage('assistant', `Great! I'm analyzing ${url} for scholarships...\n\nI found some scholarships there. Now let me ask you a few quick questions to narrow down the best matches for you:\n\n1. What's your current GPA?`);
    }

    // Send message (simulated for now)
    async function sendMessage() {
      const input = document.getElementById('userMessage');
      const message = input.value.trim();

      if (!message) return;

      addMessage('user', message);
      input.value = '';

      // Simulate collecting profile info
      const questionNumber = conversationHistory.length;

      if (questionNumber === 0) {
        // First question: GPA
        userProfile.gpa = parseFloat(message);
        addMessage('assistant', `Got it, ${userProfile.gpa} GPA! 📚\n\n2. What's your major?`);
      } else if (questionNumber === 1) {
        // Second question: Major
        userProfile.major = message;
        addMessage('assistant', `${userProfile.major} - excellent! 🎯\n\n3. Are you a first-generation college student? (yes/no)`);
      } else if (questionNumber === 2) {
        // Third question: First-gen
        userProfile.isFirstGen = message.toLowerCase().includes('yes');
        addMessage('assistant', `Got it! ${userProfile.isFirstGen ? "You'll qualify for first-gen scholarships! 🌟" : ""}\n\n4. Do you need financial assistance? (yes/no)`);
      } else if (questionNumber === 3) {
        // Fourth question: Financial need
        userProfile.financialNeed = message.toLowerCase().includes('yes');

        // Show loading and results
        addMessage('assistant', '⏳ Analyzing scholarships with your profile...');

        // Simulate delay
        setTimeout(() => {
          showResults();
        }, 1500);
      }

      conversationHistory.push({ role: 'user', content: message });
    }

    // Show results
    function showResults() {
      // Hide chat input
      document.getElementById('chatInputArea').style.display = 'none';

      // Show workspace
      document.getElementById('workspacePane').classList.add('active');
      currentPhase = 'showing-results';

      // Update profile preview
      updateProfilePreview();

      // Simulate ranked scholarships
      rankedScholarships = [
        { id: 1, name: 'Merit Excellence Award', amount: '$5,000', score: 95 },
        { id: 2, name: 'STEM Innovation Scholarship', amount: '$7,500', score: 87 },
        { id: 3, name: 'First-Generation Scholar Grant', amount: '$3,000', score: 82 }
      ];

      updateScholarshipList();

      // Final message
      addMessage('assistant', `✅ Found ${rankedScholarships.length} scholarships you qualify for!\n\nI've ranked them by your likelihood of winning (based on match score).\n\nClick any scholarship on the right to start the application process.`);
    }

    // Update profile preview
    function updateProfilePreview() {
      const preview = document.getElementById('profilePreview');
      preview.innerHTML = `
        <div class="profile-preview">
          <h3>Your Profile</h3>
          <div class="profile-item">
            <label>GPA:</label>
            <value>${userProfile.gpa || 'N/A'}</value>
          </div>
          <div class="profile-item">
            <label>Major:</label>
            <value>${userProfile.major || 'N/A'}</value>
          </div>
          <div class="profile-item">
            <label>First-Gen:</label>
            <value>${userProfile.isFirstGen ? 'Yes ✓' : 'No'}</value>
          </div>
          <div class="profile-item">
            <label>Financial Need:</label>
            <value>${userProfile.financialNeed ? 'Yes ✓' : 'No'}</value>
          </div>
        </div>
      `;
    }

    // Update scholarship list
    function updateScholarshipList() {
      const list = document.getElementById('scholarshipList');
      list.innerHTML = rankedScholarships.map((sch, idx) => `
        <div class="scholarship-item" onclick="selectScholarship(${idx})">
          <div class="scholarship-score">${sch.score}%</div>
          <div class="scholarship-name">${sch.name}</div>
          <div class="scholarship-meta">${sch.amount}</div>
        </div>
      `).join('');
    }

    // Select scholarship
    function selectScholarship(index) {
      addMessage('user', `I want to apply for: ${rankedScholarships[index].name}`);
      addMessage('assistant', `Perfect! I'll help you with that.\n\nIn the next phase, I'll load the scholarship form and give you copy buttons to fill it out easily.\n\n[Next phase: Split-screen form coming soon 🚀]`);
    }

    // Initialize on load
    window.addEventListener('load', initializeChat);
  </script>
</body>
</html>
